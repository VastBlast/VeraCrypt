name: Sync with upstream

on:
  schedule:
    - cron: '37 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SYNC_BRANCH: master
      SYNC_TOKEN: ${{ secrets.SYNC_FORK_TOKEN || github.token }}

    steps:
      - name: Sync fork from upstream
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          http_status="$(
            curl --silent --show-error --location \
              --request POST \
              --write-out "%{http_code}" \
              --output "${response_file}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${SYNC_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/merge-upstream" \
              --data "{\"branch\":\"${SYNC_BRANCH}\"}"
          )"

          cat "${response_file}"

          if [ "${http_status}" != "200" ]; then
            echo "::error::Upstream sync failed with HTTP ${http_status}."
            exit 1
          fi
